<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARCL — Medical Control Console</title>
    <!-- Reaproveita os mesmos tokens CSS, mas estrutura simplificada funcional -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
    <style>
        /* CSS brutalista extra para o painel de admin */
        body {
            background-color: #050505; /* Mais escuro, sem background fluids */
            background-image: none;
        }
        .admin-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .admin-sidebar {
            background: #0a0a0a;
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }
        .admin-main {
            padding: 30px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body class="pacs-theme-dark">
    
    <!-- Permission Error Overlay -->
    <div id="admin-error-overlay" class="hidden" style="position: absolute; top: 0; width: 100%; background: rgba(255,0,0,0.2); color: #ff4444; text-align: center; padding: 10px; border-bottom: 1px solid #ff0000; z-index: 100;">
        [ACCESS LEVEL INSUFFICIENT] ADMIN PRIVILEGES REQUIRED
    </div>

    <div class="admin-layout" id="admin-workspace" style="display: none;">
        <!-- Sidebar Brutalista -->
        <aside class="admin-sidebar">
            <div style="margin-bottom: 40px; display: flex; align-items: center; gap: 10px;">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="barcl-hero-logo"><path d="M4 4h16v16H4z"/><path d="M12 4v16"/><path d="M4 12h16"/></svg>
                <h2 style="font-size: 1.2rem; margin: 0;">CONTROL CONSOLE</h2>
            </div>

            <nav>
                <ul style="list-style: none; padding: 0;">
                    <li style="margin-bottom: 10px;"><a href="#" style="color: var(--text-primary); text-decoration: none;">Banco de Dados (Flashcards)</a></li>
                    <li style="margin-bottom: 10px;"><a href="#" style="color: var(--text-secondary); text-decoration: none;">Usuários</a></li>
                    <li style="margin-bottom: 10px;"><a href="#" style="color: var(--text-secondary); text-decoration: none;">Configurações do Sistema</a></li>
                </ul>
            </nav>
            
            <button id="logout-btn" class="btn btn-outline" style="width: 100%; margin-top: 50px;">Cerrar Sesión</button>
        </aside>

        <!-- Área Principal Funcional -->
        <main class="admin-main">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Gerenciador de Flashcards</h1>
                <button class="btn btn-primary" id="add-new-btn">+ Adicionar Flashcard</button>
            </header>

            <div class="pacs-panel" style="background: #0a0a0a; border: 1px solid var(--border-color);">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Modalidade</th>
                            <th>Diagnóstico</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <!-- Carregado via JS dinamicamente -->
                        <tr><td colspan="4" style="text-align: center; color: var(--text-secondary);">Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Flashcard Modal -->
    <div id="flashcard-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div class="pacs-panel glassmorphism" style="width: 100%; max-width: 600px; padding: 30px; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Novo Flashcard</h2>
                <button id="close-modal-btn" style="background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.5rem;">&times;</button>
            </div>
            
            <form id="flashcard-form">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-secondary);">Especialidade</label>
                    <input type="text" id="fc-specialty" required placeholder="Ex: Neumología" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; border-radius: 4px;">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-secondary);">Imagem (Upload para Storage)</label>
                    <input type="file" id="fc-image" accept="image/*" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; border-radius: 4px;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-secondary);">Pergunta</label>
                    <textarea id="fc-question" required rows="3" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; border-radius: 4px; resize: vertical;"></textarea>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-secondary);">Resposta</label>
                    <textarea id="fc-answer" required rows="2" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; border-radius: 4px; resize: vertical;"></textarea>
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 5px; color: var(--text-secondary);">Explicação Extra</label>
                    <textarea id="fc-explanation" rows="2" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; border-radius: 4px; resize: vertical;"></textarea>
                </div>

                <button type="submit" id="fc-submit-btn" class="btn btn-primary btn-full-width">
                    Salvar Flashcard
                </button>
            </form>
        </div>
    </div>

    <!-- Script Entrypoint para Admin -->
    <script type="module" src="/src/admin.main.ts"></script>
</body>
</html>
