name: CI/CD Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Type Check (TypeScript strict)
        run: npx tsc --noEmit
        
      - name: Linting
        run: npm run lint
        
      - name: Unit Tests (Vitest + Zod Validators)
        run: npm run test

      - name: E2E Tests (Playwright)
        run: npx playwright test
