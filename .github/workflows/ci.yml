name: CI/CD Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Type Check (TypeScript strict)
        run: npx tsc --noEmit
        
      - name: Linting
        run: npm run lint
        
      - name: Unit Tests (Vitest + Zod Validators)
        run: npm run test

      # E2E Tests (Playwright) — disabled until tests exist.
      # To re-enable:
      #   1. npm i -D @playwright/test
      #   2. Add at least one spec under ./e2e/
      #   3. Uncomment the step below
      # - name: E2E Tests (Playwright)
      #   run: npx playwright test
